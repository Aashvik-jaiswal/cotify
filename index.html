<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COTIFY</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="covers/covers.png">
</head>
<body>

  <div class="app">

    <header>
      <h1>
  C<span class="logo-o">O</span>TIFY
</h1>
    </header>

    <main>

      <!-- Library Section -->
      <section class="library" id="library"></section>

      <!-- Player Section -->
      <section class="player">
        <img 
          id="cover" 
          src="covers/cover1.png" 
          alt="Album Cover" 
          loading="lazy"
        />
        
        <h2 id="title">Select a song</h2>

        <canvas id="visualizer"></canvas>

        <div class="volume-container">
  
  <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

        <div class="controls">
          <button id="prev" aria-label="Previous Song">⏮</button>
          <button id="play" aria-label="Play / Pause">▶</button>
          <button id="next" aria-label="Next Song">⏭</button>
        </div>
      </section>

    </main>

  </div>
<!-- MINI PLAYER (Mobile Only) -->
<div class="mini-player" id="miniPlayer">
  <img id="mini-cover" src="covers/cover1.png" />
  
  <div class="mini-info">
    <h4 id="mini-title">Song Name</h4>
    <p id="mini-artist">COTIFY</p>
    <div class="mini-progress">
      <div class="mini-progress-bar" id="mini-progress"></div>
    </div>
  </div>

  <button id="mini-play">▶</button>
</div>
  <!-- Audio Element -->
  <audio id="audio" preload="metadata"></audio>
<canvas id="particles"></canvas>
  <script src="script.js"></script>
</body>
</html>
